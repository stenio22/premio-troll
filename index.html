<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Joias - Catálogo Exclusivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #faf9f6; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f9e498 50%, #b8860b 100%); }
        .card-shadow { box-shadow: 0 10px 30px -15px rgba(0,0,0,0.1); }
        .product-img { aspect-ratio: 1 / 1; object-fit: cover; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-6 flex justify-between items-center">
            <h1 class="font-luxury text-2xl tracking-widest text-yellow-700">GLOW JOIAS</h1>
            <button onclick="toggleAdmin()" class="text-xs uppercase tracking-widest text-gray-400 hover:text-yellow-600 transition">Administrar</button>
        </div>
    </header>

    <!-- Admin Panel (Oculto por padrão) -->
    <section id="adminPanel" class="hidden bg-white border-b border-gray-200 p-6 container mx-auto max-w-2xl mt-4 rounded-lg shadow-sm">
        <h2 class="font-luxury text-xl mb-4 text-center">Adicionar Nova Peça</h2>
        <div class="space-y-4">
            <input type="text" id="pNome" placeholder="Nome da Semijoia (ex: Colar Riviera)" class="w-full p-3 border rounded-md outline-none focus:border-yellow-500">
            <textarea id="pDesc" placeholder="Descrição Emocional (ex: Banho de ouro 18k, antialérgico, brilha como diamante)" class="w-full p-3 border rounded-md outline-none focus:border-yellow-500"></textarea>
            <div class="flex gap-4">
                <input type="number" id="pPreco" placeholder="Valor (R$)" class="w-1/2 p-3 border rounded-md outline-none focus:border-yellow-500">
                <input type="file" id="pFoto" accept="image/*" class="w-1/2 p-2 text-sm">
            </div>
            <button onclick="salvarProduto()" class="w-full gold-gradient text-white font-bold py-3 rounded-md uppercase tracking-widest hover:opacity-90 transition">Publicar no Catálogo</button>
        </div>
    </section>

    <!-- Catalog Hero -->
    <section class="py-10 text-center">
        <h2 class="font-luxury text-3xl md:text-4xl mb-2">Coleção Atemporal</h2>
        <p class="text-gray-500 italic">Realce sua essência com peças banhadas a ouro e sofisticação.</p>
    </section>

    <!-- Grid de Produtos -->
    <main class="container mx-auto px-4 pb-20">
        <div id="catalogoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <!-- Os produtos aparecerão aqui -->
        </div>
    </main>

    <!-- Footer / Contato -->
    <footer class="bg-white py-10 border-t border-gray-200">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">© 2023 Glow Joias - Semijoias de Luxo</p>
        </div>
    </footer>

    <!-- Botão Flutuante WhatsApp -->
    <a href="https://wa.me/SEUNUMEROAQUI" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:scale-110 transition-transform z-50">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    <script>
        let produtos = JSON.parse(localStorage.getItem('glow_produtos')) || [];

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
        }

        function salvarProduto() {
            const nome = document.getElementById('pNome').value;
            const desc = document.getElementById('pDesc').value;
            const preco = document.getElementById('pPreco').value;
            const fotoInput = document.getElementById('pFoto');

            if (!nome || !preco || !fotoInput.files[0]) {
                alert("Por favor, preencha nome, preço e adicione uma foto.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const novoProduto = {
                    id: Date.now(),
                    nome,
                    desc,
                    preco,
                    foto: e.target.result
                };

                produtos.push(novoProduto);
                localStorage.setItem('glow_produtos', JSON.stringify(produtos));
                renderizarCatalogo();
                limparCampos();
            };
            reader.readAsDataURL(fotoInput.files[0]);
        }

        function limparCampos() {
            document.getElementById('pNome').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('pPreco').value = '';
            document.getElementById('pFoto').value = '';
            toggleAdmin();
        }

        function removerProduto(id) {
            if(confirm("Deseja remover este produto?")) {
                produtos = produtos.filter(p => p.id !== id);
                localStorage.setItem('glow_produtos', JSON.stringify(produtos));
                renderizarCatalogo();
            }
        }

        function renderizarCatalogo() {
            const grid = document.getElementById('catalogoGrid');
            grid.innerHTML = '';

            produtos.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white rounded-lg overflow-hidden card-shadow group transition-all duration-300 hover:-translate-y-1">
                        <div class="relative">
                            <img src="${p.foto}" class="product-img w-full" alt="${p.nome}">
                            <button onclick="removerProduto(${p.id})" class="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        <div class="p-4 text-center">
                            <h3 class="font-semibold text-sm uppercase tracking-wider mb-1">${p.nome}</h3>
                            <p class="text-xs text-gray-500 mb-3 line-clamp-2">${p.desc}</p>
                            <div class="text-lg font-bold text-yellow-700 mb-4">R$ ${parseFloat(p.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                            <a href="https://wa.me/SEUNUMEROAQUI?text=Olá! Tenho interesse na peça: ${p.nome}" 
                               target="_blank"
                               class="inline-block w-full border border-yellow-700 text-yellow-700 py-2 text-xs uppercase font-bold tracking-widest hover:bg-yellow-700 hover:text-white transition">
                                Comprar
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        // Inicializar
        renderizarCatalogo();
    </script>
</body>
</html>
